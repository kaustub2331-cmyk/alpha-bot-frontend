<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#060b14" />
    <meta name="description" content="Alpha Bot — BTC Futures Trading System" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Alpha Bot" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-72.png" />

    <title>Alpha Bot</title>

    <!-- Service worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('[SW] Registered', reg.scope);
            // Handle SW messages (navigate to tab from notification tap)
            navigator.serviceWorker.addEventListener('message', event => {
              if (event.data?.type === 'NAVIGATE' && event.data.tab) {
                window.dispatchEvent(new CustomEvent('alpha-bot-navigate', { detail: { tab: event.data.tab } }));
              }
            });
          }).catch(err => console.warn('[SW] Registration failed', err));
        });
      }

      // Handle ?tab= param from notification shortcuts
      const urlParams = new URLSearchParams(window.location.search);
      const tabParam = urlParams.get('tab');
      if (tabParam) {
        window.__ALPHA_BOT_INITIAL_TAB__ = tabParam;
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
